<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treo cờ Tổ quốc - Bảo vệ hòa bình</title>
    <style>
        :root {
            --red: #da251d;
            --yellow: #ffcd00;
            --success: #0d904f;
            --danger: #d93025;
            --card: #ffffff;
            --text: #202124;
            --text-light: #5f6368;
            --border: #e0e0e0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
            background: linear-gradient(180deg, #e8f0fe 0%, #e6e6fa 40%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            user-select: none;
        }

        @keyframes flagRise {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @keyframes confettiDrop {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 6px rgba(218, 37, 29, 0.3); }
            50% { box-shadow: 0 0 18px rgba(218, 37, 29, 0.6); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeOutCollapse {
            0% { opacity: 1; max-height: 60px; transform: scale(1); }
            100% { opacity: 0; max-height: 0; transform: scale(0.9); padding-top: 0; padding-bottom: 0; margin-bottom: 0; border-width: 0; }
        }

        @keyframes victoryFlag {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        @keyframes starSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes winnerGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 205, 0, 0.4); }
            50% { box-shadow: 0 0 25px rgba(255, 205, 0, 0.8), 0 0 50px rgba(218, 37, 29, 0.4); }
        }

        .container {
            width: 100%;
            max-width: 950px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Header - nhỏ gọn */
        .header {
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #da251d;
            margin-bottom: 1px;
        }

        .header .subtitle {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        /* Flag poles area - THU NHỎ */
        .flag-area {
            display: flex;
            justify-content: center;
            gap: 50px;
            align-items: flex-end;
            background: var(--card);
            border-radius: 14px;
            padding: 10px 20px 6px;
            box-shadow: var(--shadow);
            min-height: 130px;
        }

        .flag-pole-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .flag-pole-wrapper:hover {
            transform: scale(1.04);
        }

        .flag-pole-wrapper.selected-team {
            animation: glowPulse 0.8s ease-in-out;
        }

        .flag-pole-wrapper.winner-team {
            animation: winnerGlow 1.5s ease-in-out infinite;
        }

        .team-label {
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--text);
            margin-bottom: 1px;
            text-align: center;
        }

        .pole-container {
            display: flex;
            align-items: flex-end;
            gap: 0;
            position: relative;
            height: 100px;
        }

        .pole {
            width: 5px;
            height: 100px;
            background: linear-gradient(180deg, #bdbdbd, #757575);
            border-radius: 3px 3px 0 0;
            position: relative;
            flex-shrink: 0;
        }

        .pole::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #ffcd00;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 205, 0, 0.5);
        }

        .flag-wrapper {
            position: absolute;
            left: 5px;
            transition: bottom 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .flag {
            width: 38px;
            height: 25px;
            background: #da251d;
            border-radius: 0 3px 3px 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 1px 2px 6px rgba(0, 0, 0, 0.2);
        }

        .flag::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 2px;
            height: 100%;
            background: #b71c1c;
            border-radius: 1px 0 0 1px;
        }

        .star {
            font-size: 14px;
            color: #ffcd00;
            filter: drop-shadow(0 0 2px rgba(255, 205, 0, 0.5));
        }

        .flag.fluttering {
            animation: flagRise 0.4s ease-in-out 3;
        }

        .flag.at-top {
            animation: victoryFlag 1s ease-in-out infinite;
        }

        .flag.at-top .star {
            animation: starSpin 2s ease-in-out infinite;
        }

        .score-badge {
            background: #da251d;
            color: #fff;
            font-weight: 800;
            font-size: 0.8rem;
            padding: 2px 10px;
            border-radius: 12px;
            margin-top: 3px;
        }

        .click-hint {
            font-size: 0.6rem;
            color: #da251d;
            font-weight: 600;
            margin-top: 1px;
            opacity: 0.8;
        }

        /* Question area - TO, CHIẾM DIỆN TÍCH CHÍNH */
        .question-area {
            background: var(--card);
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: var(--shadow);
            animation: slideUp 0.5s ease-out;
            flex: 1;
        }

        .status-text {
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
            color: #da251d;
            margin-bottom: 6px;
            min-height: 26px;
            animation: bounceIn 0.5s ease-out;
        }

        .question-number {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* Team selection buttons - nhỏ gọn */
        .team-select-area {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            justify-content: center;
        }

        .btn-team-select {
            flex: 1;
            max-width: 220px;
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: 700;
            border: 3px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            background: #fff;
        }

        .btn-team-select:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .btn-team1 {
            border-color: #1a73e8;
            color: #1a73e8;
        }
        .btn-team1:hover { background: #e8f0fe; }

        .btn-team2 {
            border-color: #0d904f;
            color: #0d904f;
        }
        .btn-team2:hover { background: #e8f5e9; }

        .btn-team-select.selected-team-btn {
            animation: bounceIn 0.5s ease-out, glowPulse 1s ease-in-out infinite;
        }
        .btn-team1.selected-team-btn {
            background: #e8f0fe !important;
            border-color: #1a73e8 !important;
        }
        .btn-team2.selected-team-btn {
            background: #e8f5e9 !important;
            border-color: #0d904f !important;
        }
        .btn-team-select:disabled {
            pointer-events: none;
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Answer buttons - TO, RÕ */
        .answer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .btn-answer {
            padding: 16px 18px;
            font-size: 1.05rem;
            font-weight: 700;
            border: 3px solid var(--border);
            border-radius: 14px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text);
            text-align: center;
            position: relative;
        }

        .btn-answer:hover {
            background: #fef3f2;
            border-color: #da251d;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(218, 37, 29, 0.15);
        }

        .btn-answer:active { transform: scale(0.97); }

        .btn-answer.correct-flash {
            background: #e8f5e9 !important;
            border-color: #0d904f !important;
            animation: pulse 0.5s ease-in-out;
            font-size: 1.2rem;
        }

        .btn-answer.wrong-flash {
            background: #fce8e6 !important;
            border-color: #d93025 !important;
            animation: shake 0.5s ease-in-out;
        }

        .btn-answer.fade-out {
            animation: fadeOutCollapse 0.5s ease-in-out forwards;
            pointer-events: none;
        }

        .btn-answer:disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        /* Bottom bar */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-light);
        }

        .btn-next {
            padding: 12px 24px;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
            background: #da251d;
            transition: all 0.2s;
        }

        .btn-next:hover {
            background: #b71c1c;
            transform: translateY(-2px);
        }

        .btn-next:disabled {
            background: #e0a09c;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.8rem;
            border: 2px solid #757575;
            border-radius: 12px;
            cursor: pointer;
            background: #fff;
            color: #757575;
            transition: all 0.2s;
        }
        .btn-reset:hover { background: #f5f5f5; }

        /* Game over overlay */
        .game-over-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .game-over-overlay.active { display: flex; }

        .game-over-card {
            background: #fff;
            border-radius: 24px;
            padding: 28px 22px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.5s ease-out;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .game-over-card .trophy {
            font-size: 60px;
            animation: pulse 1s ease-in-out infinite;
        }

        .game-over-card h2 {
            font-size: 1.3rem;
            margin: 6px 0;
            color: #da251d;
        }

        .game-over-card .winner-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0d904f;
            margin-bottom: 10px;
        }

        .final-scores {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 10px 0;
        }

        .btn-replay {
            padding: 10px 24px;
            font-weight: 700;
            font-size: 0.95rem;
            background: #da251d;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
        }
        .btn-replay:hover {
            background: #b71c1c;
            transform: scale(1.04);
        }

        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            z-index: 199;
            pointer-events: none;
            animation: confettiDrop 3s linear forwards;
        }

        @media (max-width: 600px) {
            .flag-area { gap: 30px; padding: 8px 12px 4px; }
            .flag { width: 30px; height: 20px; }
            .star { font-size: 11px; }
            .pole-container { height: 80px; }
            .pole { height: 80px; }
            .answer-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.2rem; }
            .question-text { font-size: 1.1rem; }
            .btn-answer { font-size: 0.9rem; padding: 12px 14px; }
            .btn-team-select { font-size: 0.8rem; padding: 8px 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>TREO CỜ TỔ QUỐC</h1>
        </div>

        <!-- Flag poles - THU NHỎ -->
        <div class="flag-area" id="flagArea">
            <div class="flag-pole-wrapper" id="flagPole1" onclick="selectTeam(0)" title="Chọn ĐỘI CHIM BỒ CÂU">
                <div class="team-label">🕊️ Chim Bồ Câu</div>
                <div class="pole-container">
                    <div class="pole"></div>
                    <div class="flag-wrapper" id="flag1" style="bottom: 0px;">
                        <div class="flag"><span class="star">⭐</span></div>
                    </div>
                </div>
                <div class="score-badge" id="score1">0 điểm</div>
                <div class="click-hint">👆 Chọn đội</div>
            </div>

            <div class="flag-pole-wrapper" id="flagPole2" onclick="selectTeam(1)" title="Chọn ĐỘI CÀNH Ô LIU">
                <div class="team-label">🌿 Cành Ô Liu</div>
                <div class="pole-container">
                    <div class="pole"></div>
                    <div class="flag-wrapper" id="flag2" style="bottom: 0px;">
                        <div class="flag"><span class="star">⭐</span></div>
                    </div>
                </div>
                <div class="score-badge" id="score2">0 điểm</div>
                <div class="click-hint">👆 Chọn đội</div>
            </div>
        </div>

        <!-- Question area - TO, CHÍNH -->
        <div class="question-area" id="questionArea">
            <div class="status-text" id="statusText">👩‍🏫 Học sinh giơ tay → Giáo viên chọn đội trả lời</div>
            <div class="question-number" id="questionNumber">Câu 1 / 6</div>
            <div class="question-text" id="questionText">Đang tải câu hỏi...</div>

            <!-- Team selection -->
            <div class="team-select-area" id="teamSelectArea">
                <button class="btn-team-select btn-team1" id="btnTeam1" onclick="selectTeam(0)">
                    🕊️ Chọn Đội Chim Bồ Câu
                </button>
                <button class="btn-team-select btn-team2" id="btnTeam2" onclick="selectTeam(1)">
                    🌿 Chọn Đội Cành Ô Liu
                </button>
            </div>

            <!-- Answer grid -->
            <div class="answer-grid" id="answerGrid">
                <button class="btn-answer" disabled>A</button>
                <button class="btn-answer" disabled>B</button>
                <button class="btn-answer" disabled>C</button>
                <button class="btn-answer" disabled>D</button>
            </div>

            <div class="bottom-bar">
                <button class="btn-reset" id="btnReset">🔄 Chơi lại</button>
                <span style="font-size:0.85rem; color:#5f6368;" id="turnIndicator"></span>
                <button class="btn-next" id="btnNext" disabled>⏭️ Câu tiếp theo</button>
            </div>
        </div>
    </div>

    <!-- Game Over -->
    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-card">
            <div class="trophy">🏆</div>
            <h2>Trò chơi kết thúc!</h2>
            <p class="winner-name" id="winnerName"></p>
            <div class="final-scores">
                <div>
                    <div style="font-weight:700;">🕊️ Chim Bồ Câu</div>
                    <div style="font-size:1.8rem; font-weight:800; color:#da251d;" id="finalScore1">0</div>
                </div>
                <div>
                    <div style="font-weight:700;">🌿 Cành Ô Liu</div>
                    <div style="font-size:1.8rem; font-weight:800; color:#da251d;" id="finalScore2">0</div>
                </div>
            </div>
            <button class="btn-replay" onclick="location.reload()">🔄 Chơi lại từ đầu</button>
        </div>
    </div>

    <!-- QUESTION DATA -->
     <script src="questions.js"></script>

    <script>
        (function() {

            // ============ GAME STATE ============
            const MAX_FLAG_HEIGHT = 82;
            const POINTS_TO_WIN = 4; // Cần 4 điểm để thắng
            const TOTAL_QUESTIONS = allQuestions.length;
            const STEP_HEIGHT = MAX_FLAG_HEIGHT / POINTS_TO_WIN; // Chia cho 4 thay vì tổng số câu

            let scores = [0, 0];
            let flagHeights = [0, 0];
            let selectedTeam = null;
            let currentQuestion = null;
            let answeredCount = 0;
            let isWaitingForNext = false;
            let roundActive = false;
            let wrongAttempts = 0;
            let remainingQuestions = [];
            let usedQuestionIds = [];
            let gameEnded = false; // Thêm biến kiểm tra game kết thúc

            // ============ DOM REFS ============
            const $flag1 = document.getElementById('flag1');
            const $flag2 = document.getElementById('flag2');
            const $flagPole1 = document.getElementById('flagPole1');
            const $flagPole2 = document.getElementById('flagPole2');
            const $score1 = document.getElementById('score1');
            const $score2 = document.getElementById('score2');
            const $questionNumber = document.getElementById('questionNumber');
            const $questionText = document.getElementById('questionText');
            const $answerGrid = document.getElementById('answerGrid');
            const $btnNext = document.getElementById('btnNext');
            const $btnReset = document.getElementById('btnReset');
            const $statusText = document.getElementById('statusText');
            const $teamSelectArea = document.getElementById('teamSelectArea');
            const $btnTeam1 = document.getElementById('btnTeam1');
            const $btnTeam2 = document.getElementById('btnTeam2');
            const $turnIndicator = document.getElementById('turnIndicator');
            const $gameOverOverlay = document.getElementById('gameOverOverlay');
            const $winnerName = document.getElementById('winnerName');
            const $finalScore1 = document.getElementById('finalScore1');
            const $finalScore2 = document.getElementById('finalScore2');
            const answerButtons = $answerGrid.querySelectorAll('.btn-answer');

            // ============ HELPERS ============
            function shuffle(arr) {
                const a = arr.slice();
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function getRandomQuestion() {
                if (remainingQuestions.length === 0) return null;
                const idx = Math.floor(Math.random() * remainingQuestions.length);
                const q = remainingQuestions[idx];
                remainingQuestions.splice(idx, 1);
                usedQuestionIds.push(q.id);
                return q;
            }

            function updateFlag(teamIndex) {
                const flag = teamIndex === 0 ? $flag1 : $flag2;
                const height = Math.min(flagHeights[teamIndex], MAX_FLAG_HEIGHT);
                flag.style.bottom = height + 'px';
                
                if (height > 0) {
                    flag.querySelector('.flag').classList.add('fluttering');
                    setTimeout(() => flag.querySelector('.flag').classList.remove('fluttering'), 1200);
                }
                
                // Thêm hiệu ứng đặc biệt khi cờ lên đỉnh
                if (height >= MAX_FLAG_HEIGHT) {
                    flag.querySelector('.flag').classList.add('at-top');
                    const poleWrapper = teamIndex === 0 ? $flagPole1 : $flagPole2;
                    poleWrapper.classList.add('winner-team');
                }
            }

            function updateScores() {
                $score1.textContent = scores[0] + ' điểm';
                $score2.textContent = scores[1] + ' điểm';
            }

            function clearTeamSelection() {
                selectedTeam = null;
                wrongAttempts = 0;
                $btnTeam1.classList.remove('selected-team-btn');
                $btnTeam2.classList.remove('selected-team-btn');
                $flagPole1.classList.remove('selected-team');
                $flagPole2.classList.remove('selected-team');
                $btnTeam1.disabled = false;
                $btnTeam2.disabled = false;
                $teamSelectArea.style.display = 'flex';
                $statusText.textContent = '👩‍🏫 Học sinh giơ tay → Giáo viên chọn đội trả lời';
                $statusText.style.color = '#da251d';
                disableAllAnswers();
                $turnIndicator.textContent = '';
            }

            function disableAllAnswers() {
                answerButtons.forEach(b => {
                    b.disabled = true;
                    b.classList.remove('fade-out');
                    b.style.display = '';
                });
            }

            function enableAllAnswers() {
                answerButtons.forEach(b => {
                    if (!b.classList.contains('fade-out')) {
                        b.disabled = false;
                    }
                });
            }

            function highlightTeamSelection(teamIndex) {
                if (teamIndex === 0) {
                    $btnTeam1.classList.add('selected-team-btn');
                    $btnTeam2.classList.remove('selected-team-btn');
                    $flagPole1.classList.add('selected-team');
                    $flagPole2.classList.remove('selected-team');
                } else {
                    $btnTeam2.classList.add('selected-team-btn');
                    $btnTeam1.classList.remove('selected-team-btn');
                    $flagPole2.classList.add('selected-team');
                    $flagPole1.classList.remove('selected-team');
                }
                $btnTeam1.disabled = true;
                $btnTeam2.disabled = true;
                $teamSelectArea.style.display = 'none';
            }

            function spawnConfetti(count = 40) {
                const colors = ['#da251d', '#ffcd00', '#0d904f', '#1a73e8', '#ff6d01', '#7c4dff'];
                for (let i = 0; i < count; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.top = -(Math.random() * 200) + 'px';
                    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
                    piece.style.animationDelay = Math.random() * 1.5 + 's';
                    document.body.appendChild(piece);
                    setTimeout(() => piece.remove(), 5000);
                }
            }

            function loadQuestion() {
                if (gameEnded) return; // Không load câu hỏi mới nếu game đã kết thúc
                
                const q = getRandomQuestion();
                if (!q) {
                    endGame();
                    return;
                }
                currentQuestion = q;
                isWaitingForNext = false;
                roundActive = false;
                selectedTeam = null;
                wrongAttempts = 0;

                $questionNumber.textContent = 'Câu ' + (answeredCount + 1) + ' / ' + TOTAL_QUESTIONS;
                $questionText.textContent = q.question;
                $btnNext.disabled = true;

                answerButtons.forEach((btn, i) => {
                    btn.textContent = q.options[i];
                    btn.disabled = true;
                    btn.classList.remove('correct-flash', 'wrong-flash', 'fade-out');
                    btn.style.display = '';
                });

                clearTeamSelection();
            }

            // Global function
            window.selectTeam = function(teamIndex) {
                if (!currentQuestion || isWaitingForNext || roundActive || gameEnded) return;
                if (selectedTeam !== null) return;

                selectedTeam = teamIndex;
                highlightTeamSelection(teamIndex);
                roundActive = true;
                enableAllAnswers();

                const teamName = teamIndex === 0 ? 'ĐỘI CHIM BỒ CÂU' : 'ĐỘI CÀNH Ô LIU';
                $statusText.textContent = '✅ ' + teamName + ' được chọn! Hãy chọn đáp án';
                $statusText.style.color = '#0d904f';
                $turnIndicator.textContent = '🎤 Đang trả lời: ' + teamName;
            };

            function handleAnswer(selectedIndex) {
                if (!roundActive || isWaitingForNext || selectedTeam === null || gameEnded) return;
                if (!currentQuestion) return;

                const isCorrect = (selectedIndex === currentQuestion.correct);
                const selectedButton = answerButtons[selectedIndex];

                if (isCorrect) {
                    // ĐÚNG
                    roundActive = false;
                    scores[selectedTeam]++;
                    // Tính chiều cao dựa trên POINTS_TO_WIN (4)
                    flagHeights[selectedTeam] = Math.min(scores[selectedTeam], POINTS_TO_WIN) * STEP_HEIGHT;
                    updateFlag(selectedTeam);
                    updateScores();
                    answeredCount++;

                    // Highlight đúng
                    answerButtons.forEach(b => b.disabled = true);
                    selectedButton.classList.add('correct-flash');

                    const teamName = selectedTeam === 0 ? 'Đội Chim Bồ Câu' : 'Đội Cành Ô Liu';
                    $statusText.textContent = '🎉 Chính xác! +1 điểm cho ' + teamName + '!';
                    $statusText.style.color = '#0d904f';
                    $turnIndicator.textContent = '';

                    // Kiểm tra điều kiện thắng (4 điểm)
                    if (scores[selectedTeam] >= POINTS_TO_WIN) {
                        // Đội này đã thắng!
                        gameEnded = true;
                        isWaitingForNext = true;
                        $btnNext.disabled = true; // Vô hiệu hóa nút tiếp theo
                        $btnTeam1.disabled = true;
                        $btnTeam2.disabled = true;
                        $teamSelectArea.style.display = 'none';
                        
                        $statusText.textContent = '🏆 ' + teamName + ' đã kéo cờ lên đỉnh và CHIẾN THẮNG! 🏆';
                        $statusText.style.color = '#ffcd00';
                        
                        // Hiển thị game over sau 1.5 giây
                        setTimeout(() => {
                            endGame();
                        }, 1500);
                    } else {
                        isWaitingForNext = true;
                        $btnNext.disabled = false;
                        $btnTeam1.disabled = true;
                        $btnTeam2.disabled = true;
                        $teamSelectArea.style.display = 'none';
                    }
                } else {
                    // SAI - đáp án biến mất
                    wrongAttempts++;
                    selectedButton.classList.add('wrong-flash');

                    setTimeout(() => {
                        selectedButton.classList.add('fade-out');
                        selectedButton.disabled = true;
                    }, 400);

                    const remaining = answerButtons.length - wrongAttempts;

                    if (remaining <= 1) {
                        // Chỉ còn 1 đáp án (đáp án đúng) → tự động lộ
                        roundActive = false;
                        answerButtons.forEach(b => {
                            b.disabled = true;
                            const idx = Array.from(answerButtons).indexOf(b);
                            if (idx === currentQuestion.correct && !b.classList.contains(
                                'fade-out')) {
                                b.classList.add('correct-flash');
                            }
                        });
                        answeredCount++;
                        $statusText.textContent =
                            '😔 Không đội nào trả lời đúng. Đáp án đã được hiển thị.';
                        $statusText.style.color = '#d93025';
                        $turnIndicator.textContent = '';
                        isWaitingForNext = true;
                        $btnNext.disabled = false;
                        $teamSelectArea.style.display = 'none';
                    } else {
                        // Đổi đội
                        const oldTeam = selectedTeam;
                        selectedTeam = selectedTeam === 0 ? 1 : 0;
                        highlightTeamSelection(selectedTeam);

                        const newTeamName = selectedTeam === 0 ? 'ĐỘI CHIM BỒ CÂU' : 'ĐỘI CÀNH Ô LIU';
                        $statusText.textContent =
                            '❌ Sai! Còn ' + remaining + ' đáp án. Lượt chuyển sang ' + newTeamName +
                            '!';
                        $statusText.style.color = '#d93025';
                        $turnIndicator.textContent = '🎤 Đang trả lời: ' + newTeamName;
                        enableAllAnswers();
                    }
                }
            }

            function nextQuestion() {
                if (!isWaitingForNext || gameEnded) return;
                loadQuestion();
            }

            function endGame() {
                gameEnded = true;
                roundActive = false;
                isWaitingForNext = true;
                currentQuestion = null;
                $btnNext.disabled = true;
                disableAllAnswers();
                $btnTeam1.disabled = true;
                $btnTeam2.disabled = true;
                $teamSelectArea.style.display = 'none';
                $questionNumber.textContent = 'Hoàn thành!';
                $questionText.textContent = 'Trò chơi kết thúc! Xem kết quả bên trên...';
                $statusText.textContent = '🏁 Kết thúc!';
                $statusText.style.color = '#5f6368';
                $turnIndicator.textContent = '';

                if (scores[0] > scores[1]) {
                    $winnerName.innerHTML = '🏆 ĐỘI CHIM BỒ CÂU CHIẾN THẮNG!';
                } else if (scores[1] > scores[0]) {
                    $winnerName.innerHTML = '🏆 ĐỘI CÀNH Ô LIU CHIẾN THẮNG!';
                } else {
                    $winnerName.innerHTML = '🤝 HÒA NHAU! Cả hai đội đều xuất sắc!';
                }

                $finalScore1.textContent = scores[0];
                $finalScore2.textContent = scores[1];
                $gameOverOverlay.classList.add('active');
                spawnConfetti(50);
            }

            function resetGame() {
                scores = [0, 0];
                flagHeights = [0, 0];
                selectedTeam = null;
                answeredCount = 0;
                isWaitingForNext = false;
                roundActive = false;
                wrongAttempts = 0;
                gameEnded = false; // Reset trạng thái game
                usedQuestionIds = [];
                remainingQuestions = shuffle([...allQuestions]);
                
                // Reset hiệu ứng cờ
                updateFlag(0);
                updateFlag(1);
                updateScores();
                
                // Xóa hiệu ứng winner
                $flag1.querySelector('.flag').classList.remove('at-top');
                $flag2.querySelector('.flag').classList.remove('at-top');
                $flagPole1.classList.remove('winner-team');
                $flagPole2.classList.remove('winner-team');
                
                $gameOverOverlay.classList.remove('active');
                $btnTeam1.disabled = false;
                $btnTeam2.disabled = false;
                $teamSelectArea.style.display = 'flex';
                disableAllAnswers();
                loadQuestion();
            }

            // ============ EVENT LISTENERS ============
            $answerGrid.addEventListener('click', (e) => {
                const btn = e.target.closest('.btn-answer');
                if (!btn || btn.disabled || btn.classList.contains('fade-out')) return;
                const index = Array.from(answerButtons).indexOf(btn);
                if (index >= 0) handleAnswer(index);
            });

            $btnNext.addEventListener('click', nextQuestion);
            $btnReset.addEventListener('click', () => {
                if (confirm('Bạn có chắc muốn chơi lại từ đầu?')) resetGame();
            });

            document.addEventListener('keydown', (e) => {
                if ($gameOverOverlay.classList.contains('active')) return;
                if ((e.key === 'q' || e.key === 'Q') && !roundActive && !isWaitingForNext &&
                    currentQuestion && !gameEnded) {
                    e.preventDefault();
                    selectTeam(0);
                }
                if ((e.key === 'p' || e.key === 'P') && !roundActive && !isWaitingForNext &&
                    currentQuestion && !gameEnded) {
                    e.preventDefault();
                    selectTeam(1);
                }
                if (e.key >= '1' && e.key <= '4' && roundActive && !isWaitingForNext && selectedTeam !==
                    null && !gameEnded) {
                    const idx = parseInt(e.key) - 1;
                    const btn = answerButtons[idx];
                    if (btn && !btn.disabled && !btn.classList.contains('fade-out')) {
                        handleAnswer(idx);
                    }
                }
                if ((e.key === 'Enter' || e.key === ' ') && isWaitingForNext && !gameEnded) {
                    e.preventDefault();
                    nextQuestion();
                }
            });

            // ============ INIT ============
            remainingQuestions = shuffle([...allQuestions]);
            loadQuestion();
            updateScores();
            console.log('🇻🇳 Treo cờ Tổ quốc đã sẵn sàng!');
            console.log('   👩‍🏫 Giáo viên chọn đội giơ tay trước (Q/P hoặc click)');
            console.log('   ❌ Sai → đáp án biến mất → đội kia trả lời');
            console.log('   🎲 Câu hỏi xuất hiện ngẫu nhiên');
            console.log('   ✅ Đúng: +1 điểm, cờ kéo lên');
            console.log('   🏆 Đạt 4 điểm: Cờ lên đỉnh → CHIẾN THẮNG!');
            console.log('   ⌨️ Q/P: chọn đội | 1-4: chọn đáp án | Enter: tiếp tục');
        })();
    </script>
</body>
</html>
